name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker image and push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (suporte multi-plataforma)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Autentica somente em push na branch principal
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extrair metadados (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lambda-authorize
          tags: |
            # latest em pushes na main
            type=raw,value=latest,enable={{is_default_branch}}
            # tag com o SHA curto do commit
            type=sha,format=short
            # tag com número da PR (apenas em pull_requests)
            type=ref,event=pr

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Faz push somente em push direto na main (não em PRs)
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de camadas para acelerar builds subsequentes
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ---------------------------------------------------------------------------
# Secrets necessários no repositório GitHub:
#   DOCKERHUB_USERNAME — seu usuário no Docker Hub
#   DOCKERHUB_TOKEN    — Access Token gerado em hub.docker.com → Account Settings
# ---------------------------------------------------------------------------
