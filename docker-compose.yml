services:

  # --------------------------------------------------------------------------
  # lambda-builder — instala dependências e empacota o código em lambda.zip
  # --------------------------------------------------------------------------
  lambda-builder:
    image: public.ecr.aws/lambda/python:3.13
    entrypoint: ["/bin/bash", "/build.sh"]
    volumes:
      - ./src:/lambda/src:ro
      - ./requirements.txt:/lambda/requirements.txt:ro
      - ./init/lambda/build.sh:/build.sh:ro
      - lambda-zip:/lambda/dist
    restart: "no"
    networks:
      - lambda-authorize-net

  # --------------------------------------------------------------------------
  # PostgreSQL — banco de dados local com schema e seed automáticos
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: lambdaauth
      POSTGRES_USER: lambda
      POSTGRES_PASSWORD: lambda
    volumes:
      - ./init/database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lambda -d lambdaauth"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - lambda-authorize-net

  # --------------------------------------------------------------------------
  # LocalStack — emula AWS Secrets Manager, Lambda e API Gateway localmente
  # Não exposto diretamente; o gateway nginx roteia /auth/v1/login para cá.
  # --------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:4.14.0
    environment:
      SERVICES: secretsmanager,lambda,apigateway,route53
      DEBUG: "0"
      LOCALSTACK_HOST: localhost:4566
    volumes:
      - ./init/aws:/etc/localstack/init/ready.d:ro
      - ./init/certs:/usr/share/localstack/certs:ro
      - lambda-zip:/var/lib/localstack/lambda-zip:ro
      - gateway-config:/gateway-config
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15
    depends_on:
      lambda-builder:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - lambda-authorize-net

  # --------------------------------------------------------------------------
  # Gateway nginx — único serviço exposto; roteia /auth/v1/login para a Lambda
  # http://localhost:4566/auth/v1/login
  # --------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    entrypoint: ["/bin/sh", "/start.sh"]
    volumes:
      - ./init/nginx/start.sh:/start.sh:ro
      - gateway-config:/gateway-config:ro
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - lambda-authorize-net

volumes:
  lambda-zip:
  gateway-config:

networks:
  lambda-authorize-net:
    driver: bridge