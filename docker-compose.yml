services:

  # --------------------------------------------------------------------------
  # LocalStack — emula o AWS Secrets Manager localmente
  # --------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:4.14.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: secretsmanager
      DEBUG: "0"
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/01_init.sh:ro
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15

  # --------------------------------------------------------------------------
  # PostgreSQL — banco de dados local com schema e seed automáticos
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:17.4
    environment:
      POSTGRES_DB: lambdaauth
      POSTGRES_USER: lambda
      POSTGRES_PASSWORD: lambda
    volumes:
      - ./migrations/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./migrations/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lambda -d lambdaauth"]
      interval: 5s
      timeout: 5s
      retries: 15

  # --------------------------------------------------------------------------
  # lambda-authorize — função Lambda com runtime local (AWS RIE)
  # --------------------------------------------------------------------------
  lambda-authorize:
    build: .
    image: lambda-authorize:local
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: lambdaauth
      DB_USER: lambda
      DB_PASSWORD: lambda
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: sa-east-1
      JWT_EXPIRATION_HOURS: "1"
      PEPPER_SECRET_NAME: /lambda-authorize/pepper
      PRIVATE_KEY_SECRET_NAME: /lambda-authorize/private-key
      PUBLIC_KEY_SECRET_NAME: /lambda-authorize/public-key
      JWKS_KID: dev-key-1
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy

# ---------------------------------------------------------------------------
# Como testar (após `docker compose up --build`):
#
# Gere os certificados antes de subir (apenas uma vez):
#   openssl genrsa -out certs/private.pem 2048
#   openssl rsa -in certs/private.pem -pubout -out certs/public.pem
#
# Autenticar:
#   curl -X POST http://localhost:8080/2015-03-31/functions/function/invocations \
#     -H 'Content-Type: application/json' \
#     -d '{"rawPath": "/login", "requestContext": {"http": {"method": "POST"}}, "body": "{\"email\": \"william_cesar_santos@hotmail.com\", \"password\": \"lambda_123_AUTHORIZE\"}"}'
#
# Obter JWKS (requer Bearer token obtido no passo anterior):
#   curl -X POST http://localhost:8080/2015-03-31/functions/function/invocations \
#     -H 'Content-Type: application/json' \
#     -d '{"rawPath": "/.well-known/jwks.json", "requestContext": {"http": {"method": "GET"}}, "headers": {"Authorization": "Bearer <token>"}}'
